<html lang="fr">
<head>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; /* Darker background for scrollbar track */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; /* Greyish thumb */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a677d; /* Lighter grey on hover */
        }

        .code-area-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden; /* Ensure content doesn't spill */
            position: relative; /* Needed for absolute positioning of overlay */
        }

        .line-numbers {
            width: 40px; /* Fixed width for line numbers */
            text-align: right; /* Align numbers to the right */
            padding: 0 8px; /* Padding to keep numbers close to text */
            color: #888;
            user-select: none;
            flex-shrink: 0; /* Prevent shrinking */
            background-color: #1a202c; /* Match code editor background */
            border-right: 1px solid #2d3748; /* Separator */
            overflow-y: hidden; /* Hide scrollbar, controlled by textarea */
        }

        .line-numbers div {
            height: 1.2em; /* Approximate line height */
            line-height: 1.2em;
            /* Default line number color */
            color: #888;
            transition: background-color 0.1s ease; /* Smooth transition for highlight changes */
        }

        /* Line number highlighting for comparison */
        .line-numbers div.same-line {
            background-color: rgba(74, 222, 128, 0.3); /* Green for identical lines */
            color: #d1fae5; /* Lighter text for contrast */
        }

        .line-numbers div.similar-line {
            background-color: rgba(96, 165, 250, 0.3); /* Blue for similar lines */
            color: #bfdbfe; /* Lighter text for contrast */
        }

        .line-numbers div.different-line {
            background-color: rgba(239, 68, 68, 0.3); /* Red for different lines */
            color: #fee2e2; /* Lighter text for contrast */
        }


        .code-editor {
            flex-grow: 1;
            position: relative;
            overflow: hidden; /* Hide internal scrollbars, controlled by custom scroll */
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: transparent; /* Make textarea background transparent */
            color: transparent; /* Make textarea text transparent */
            caret-color: #f8f8f2; /* Keep caret visible */
            border: none;
            resize: none;
            outline: none;
            padding: 10px;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace; /* Monospaced font */
            font-size: 0.9rem;
            line-height: 1.2em;
            overflow-y: scroll; /* Enable scrolling for textarea */
            white-space: pre; /* Preserve whitespace */
            word-wrap: normal; /* Prevent wrapping */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
            position: absolute; /* Position textarea over the overlay */
            top: 0;
            left: 0;
            z-index: 2; /* Ensure textarea is above the overlay for input */
        }

        /* Hide the native scrollbar for textarea, but keep scrolling functionality */
        textarea::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        textarea {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }


        /* Overlay for highlighted code */
        .highlighted-code-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 10px;
            pointer-events: none; /* Allow clicks to pass through to textarea */
            overflow-y: hidden; /* Sync with textarea scroll, hide its own scrollbar */
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.2em;
            white-space: pre;
            word-wrap: normal;
            -webkit-overflow-scrolling: touch;
            z-index: 1; /* Ensure overlay is below textarea */
        }

        .highlighted-code-overlay pre {
            margin: 0;
            padding: 0;
            background: none; /* No background from highlight.js */
        }

        .highlighted-code-overlay code {
            display: block; /* Each line on its own block */
            padding: 0;
            background: none; /* No background from highlight.js */
        }

        .diff-line {
            background-color: rgba(74, 222, 128, 0.2); /* Green highlight for differences in code content */
        }

        /* Drag and Drop styles */
        .drag-over {
            border: 2px dashed #4ade80; /* Green dashed border */
            background-color: rgba(74, 222, 128, 0.1); /* Light green background */
        }

        /* Hide the actual file input, use a custom button */
        .hidden-file-input {
            display: none;
        }

        /* Custom modal for messages */
        .message-box-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .message-box-content {
            background-color: #1a202c;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: #f8f8f2;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>

    <script>
        const code1Textarea = document.getElementById('code1');
        const code2Textarea = document.getElementById('code2');
        const lineNumbers1Div = document.getElementById('lineNumbers1');
        const lineNumbers2Div = document.getElementById('lineNumbers2');
        const highlightedCode1Div = document.getElementById('highlightedCode1');
        const highlightedCode2Div = document.getElementById('highlightedCode2');
        const syncScrollBtn = document.getElementById('syncScrollBtn');
        const compareBtn = document.getElementById('compareBtn');
        const clearBtn = document.getElementById('clearBtn');
        const editor1Section = document.getElementById('editor1');
        const editor2Section = document.getElementById('editor2');
        const fileInput1 = document.getElementById('fileInput1');
        const fileInput2 = document.getElementById('fileInput2');
        const importFileBtn1 = document.getElementById('importFileBtn1');
        const importFileBtn2 = document.getElementById('importFileBtn2');
        const searchLineBtn = document.getElementById('searchLineBtn');
        const searchLineInputContainer = document.getElementById('searchLineInputContainer');
        const lineNumberInput = document.getElementById('lineNumberInput');
        const gotoLineBtn = document.getElementById('gotoLineBtn');

        let syncScrollEnabled = false;
        let isComparing = false; // State to track if comparison is active

        // Function to update line numbers
        function updateLineNumbers(textarea, lineNumbersDiv) {
            const lines = textarea.value.split('\n');
            const numLines = lines.length;
            let lineNumbersHtml = '';
            for (let i = 1; i <= numLines; i++) {
                lineNumbersHtml += `<div data-line-number="${i}">${i}</div>`;
            }
            lineNumbersDiv.innerHTML = lineNumbersHtml;
        }

        // Function to get language hint from file extension
        function getLanguageFromFilename(filename) {
            const parts = filename.split('.');
            if (parts.length > 1) {
                const ext = parts[parts.length - 1].toLowerCase();
                // Map common extensions to highlight.js language names
                switch (ext) {
                    case 'js': return 'javascript';
                    case 'html':
                    case 'htm': return 'xml'; // highlight.js uses xml for html
                    case 'css': return 'css';
                    case 'json': return 'json';
                    case 'py': return 'python';
                    case 'java': return 'java';
                    case 'c': return 'c';
                    case 'cpp': return 'cpp';
                    case 'php': return 'php';
                    case 'rb': return 'ruby';
                    case 'sh': return 'bash';
                    case 'md': return 'markdown';
                    case 'ts': return 'typescript';
                    case 'jsx': return 'javascript'; // JSX is JavaScript
                    case 'tsx': return 'typescript'; // TSX is TypeScript
                    case 'vue': return 'xml'; // Vue SFCs are mostly HTML
                    case 'go': return 'go';
                    case 'swift': return 'swift';
                    case 'kt': return 'kotlin';
                    case 'sql': return 'sql';
                    case 'r': return 'r';
                    case 'dart': return 'dart';
                    case 'scss': return 'scss';
                    case 'less': return 'less';
                    case 'sass': return 'sass';
                    case 'yaml':
                    case 'yml': return 'yaml';
                    case 'xml': return 'xml';
                    case 'txt': return 'plaintext'; // No highlighting for plain text
                    case 'docx': return 'plaintext'; // Handle Word docs as plain text
                    default: return 'plaintext';
                }
            }
            return 'plaintext';
        }

        // Function to apply syntax highlighting
        function highlightCode(textarea, highlightedDiv, filename = '') {
            const code = textarea.value; // Get the raw text content from the textarea
            const language = getLanguageFromFilename(filename);
            let highlightedHtml = '';

            // Split code into lines for individual highlighting and diff styling
            const lines = code.split('\n');
            lines.forEach((line, index) => {
                let highlightedLine;
                if (language === 'plaintext') {
                    // For plain text, we need to manually escape HTML entities
                    highlightedLine = escapeHtml(line);
                } else {
                    try {
                        // highlight.js automatically escapes HTML entities in the input text
                        highlightedLine = hljs.highlight(line, { language: language, ignoreIllegals: true }).value;
                    } catch (e) {
                        // Fallback to auto-detection if specific language fails, also escapes HTML
                        highlightedLine = hljs.highlightAuto(line).value;
                    }
                }
                // Wrap each line in a div for potential diff highlighting
                highlightedHtml += `<div data-line-index="${index}">${highlightedLine}</div>`;
            });

            // Set the innerHTML of the overlay. highlight.js output is already safe HTML.
            highlightedDiv.innerHTML = `<pre><code>${highlightedHtml}</code></pre>`;
        }

        // Helper function to manually escape HTML entities (for plaintext)
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }


        // Event listener for textarea input
        function handleCodeInput(textarea, lineNumbersDiv, highlightedDiv, filename = '') {
            updateLineNumbers(textarea, lineNumbersDiv);
            highlightCode(textarea, highlightedDiv, filename);
            checkCompareButtonState();
            // If comparison is active, re-run comparison on input
            if (isComparing) {
                compareCodes();
            } else {
                // Clear any existing diff highlights if not in compare mode
                clearDiffHighlights();
            }
        }

        code1Textarea.addEventListener('input', () => handleCodeInput(code1Textarea, lineNumbers1Div, highlightedCode1Div));
        code2Textarea.addEventListener('input', () => handleCodeInput(code2Textarea, lineNumbers2Div, highlightedCode2Div));

        // Initial update on load
        window.addEventListener('load', () => {
            handleCodeInput(code1Textarea, lineNumbers1Div, highlightedCode1Div);
            handleCodeInput(code2Textarea, lineNumbers2Div, highlightedCode2Div);
        });

        // Synchronized Scrolling
        function syncScroll(scrollingElement, targetElement, targetLineNumbers) {
            if (syncScrollEnabled) {
                targetElement.scrollTop = scrollingElement.scrollTop;
                targetLineNumbers.scrollTop = scrollingElement.scrollTop;
            }
        }

        code1Textarea.addEventListener('scroll', () => {
            lineNumbers1Div.scrollTop = code1Textarea.scrollTop;
            highlightedCode1Div.scrollTop = code1Textarea.scrollTop;
            syncScroll(code1Textarea, code2Textarea, lineNumbers2Div);
            syncScroll(code1Textarea, highlightedCode2Div, lineNumbers2Div); // Sync overlay too
        });

        code2Textarea.addEventListener('scroll', () => {
            lineNumbers2Div.scrollTop = code2Textarea.scrollTop;
            highlightedCode2Div.scrollTop = code2Textarea.scrollTop;
            syncScroll(code2Textarea, code1Textarea, lineNumbers1Div);
            syncScroll(code2Textarea, highlightedCode1Div, lineNumbers1Div); // Sync overlay too
        });

        syncScrollBtn.addEventListener('click', () => {
            syncScrollEnabled = !syncScrollEnabled;
            syncScrollBtn.textContent = syncScrollEnabled ? 'Défilement Synchronisé (Activé)' : 'Mettre les lignes au même niveau';
            syncScrollBtn.classList.toggle('bg-blue-600', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('bg-blue-800', syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-700', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-900', syncScrollEnabled);

            // If enabling sync scroll, ensure both are at the same scroll position
            if (syncScrollEnabled) {
                code2Textarea.scrollTop = code1Textarea.scrollTop;
                lineNumbers2Div.scrollTop = lineNumbers1Div.scrollTop;
                highlightedCode2Div.scrollTop = highlightedCode1Div.scrollTop;
            }
        });

        // Comparison Logic
        function clearDiffHighlights() {
            // Clear code content highlights
            document.querySelectorAll('.diff-line').forEach(el => {
                el.classList.remove('diff-line');
            });

            // Clear line number highlights
            const allLineNumbers1 = lineNumbers1Div.querySelectorAll('div');
            const allLineNumbers2 = lineNumbers2Div.querySelectorAll('div');
            allLineNumbers1.forEach(number => {
                number.classList.remove('same-line', 'similar-line', 'different-line');
            });
            allLineNumbers2.forEach(number => {
                number.classList.remove('same-line', 'similar-line', 'different-line');
            });
        }

        function compareCodes() {
            clearDiffHighlights(); // Clear previous highlights first

            const lines1 = code1Textarea.value.split('\n');
            const lines2 = code2Textarea.value.split('\n');

            const maxLength = Math.max(lines1.length, lines2.length);

            for (let i = 0; i < maxLength; i++) {
                const line1 = lines1[i] ? lines1[i].trim() : ''; // Trim whitespace for comparison
                const line2 = lines2[i] ? lines2[i].trim() : '';

                const highlightedLine1 = highlightedCode1Div.querySelector(`[data-line-index="${i}"]`);
                const highlightedLine2 = highlightedCode2Div.querySelector(`[data-line-index="${i}"]`);
                const lineNumberDiv1 = lineNumbers1Div.querySelector(`[data-line-number="${i + 1}"]`);
                const lineNumberDiv2 = lineNumbers2Div.querySelector(`[data-line-number="${i + 1}"]`);

                if (line1 === line2) {
                    // Identical lines: Green for line numbers, no general diff highlight on content
                    if (lineNumberDiv1) lineNumberDiv1.classList.add('same-line');
                    if (lineNumberDiv2) lineNumberDiv2.classList.add('same-line');
                } else {
                    // Lines are different: Apply general diff highlight to content
                    if (highlightedLine1) highlightedLine1.classList.add('diff-line');
                    if (highlightedLine2) highlightedLine2.classList.add('diff-line');

                    // Check for common words for 'similar' classification
                    const words1 = new Set(line1.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0)); // Tokenize and clean
                    const words2 = new Set(line2.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0));

                    let hasCommonWord = false;
                    for (const word of words1) {
                        if (words2.has(word)) {
                            hasCommonWord = true;
                            break;
                        }
                    }

                    if (hasCommonWord) {
                        // Similar lines: Blue for line numbers
                        if (lineNumberDiv1) lineNumberDiv1.classList.add('similar-line');
                        if (lineNumberDiv2) lineNumberDiv2.classList.add('similar-line');
                    } else {
                        // Completely different lines: Red for line numbers
                        if (lineNumberDiv1) lineNumberDiv1.classList.add('different-line');
                        if (lineNumberDiv2) lineNumberDiv2.classList.add('different-line');
                    }
                }
            }
            isComparing = true; // Set comparison state to true
        }

        compareBtn.addEventListener('click', compareCodes);

        // Check if compare button should be enabled
        function checkCompareButtonState() {
            if (code1Textarea.value.trim() !== '' && code2Textarea.value.trim() !== '') {
                compareBtn.disabled = false;
                compareBtn.classList.remove('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                compareBtn.disabled = true;
                compareBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                clearDiffHighlights(); // Clear highlights if one editor becomes empty
                isComparing = false; // Reset comparison state
            }
        }

        // Initial check for compare button state
        checkCompareButtonState();

        // Clear All button
        clearBtn.addEventListener('click', () => {
            code1Textarea.value = '';
            code2Textarea.value = '';
            handleCodeInput(code1Textarea, lineNumbers1Div, highlightedCode1Div);
            handleCodeInput(code2Textarea, lineNumbers2Div, highlightedCode2Div);
            checkCompareButtonState();
            clearDiffHighlights();
            isComparing = false;
            // Reset sync scroll button state
            syncScrollEnabled = false;
            syncScrollBtn.textContent = 'Mettre les lignes au même niveau';
            syncScrollBtn.classList.remove('bg-blue-800', 'hover:bg-blue-900');
            syncScrollBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
        });

        // File Input Handling
        function handleFile(file, textarea, lineNumbersDiv, highlightedDiv) {
            const reader = new FileReader();
            reader.onload = (e) => {
                textarea.value = e.target.result;
                handleCodeInput(textarea, lineNumbersDiv, highlightedDiv, file.name);
            };
            // For .docx files, read as ArrayBuffer and then attempt to convert to text
            // This is a simplified approach; a proper .docx parser is complex.
            if (file.name.endsWith('.docx')) {
                // This part is a placeholder for actual docx parsing.
                // In a real scenario, you'd use a library like 'mammoth.js' or send to a server.
                // For now, we'll just read it as text if possible, or show a warning.
                reader.readAsText(file); // This will likely fail for binary docx
                // Using a custom modal/message box instead of alert()
                showMessageBox("Les documents Word (.docx) seront affichés en texte brut, leur formatage riche n'est pas pris en charge pour la comparaison de code.");
            } else {
                reader.readAsText(file);
            }
        }

        // Custom Message Box (instead of alert)
        function showMessageBox(message) {
            const messageBox = document.createElement('div');
            messageBox.className = 'message-box-overlay';
            messageBox.innerHTML = `
                <div class="message-box-content">
                    <p class="mb-4">${message}</p>
                    <button id="closeMessageBox" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md">OK</button>
                </div>
            `;
            document.body.appendChild(messageBox);

            document.getElementById('closeMessageBox').addEventListener('click', () => {
                document.body.removeChild(messageBox);
            });
        }


        // Event listeners for "Importer Fichier" buttons
        importFileBtn1.addEventListener('click', () => {
            fileInput1.click(); // This should trigger the file browser
        });

        importFileBtn2.addEventListener('click', () => {
            fileInput2.click(); // This should trigger the file browser
        });

        fileInput1.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, code1Textarea, lineNumbers1Div, highlightedCode1Div);
            }
        });

        fileInput2.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, code2Textarea, lineNumbers2Div, highlightedCode2Div);
            }
        });

        // Drag and Drop Handling
        function setupDragAndDrop(editorSection, textarea, lineNumbersDiv, highlightedDiv) {
            editorSection.addEventListener('dragover', (e) => {
                e.preventDefault();
                editorSection.classList.add('drag-over');
            });

            editorSection.addEventListener('dragleave', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
            });

            editorSection.addEventListener('drop', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file) {
                    handleFile(file, textarea, lineNumbersDiv, highlightedDiv);
                }
            });
        }

        setupDragAndDrop(editor1Section, code1Textarea, lineNumbers1Div, highlightedCode1Div);
        setupDragAndDrop(editor2Section, code2Textarea, lineNumbers2Div, highlightedCode2Div);

        // Line Search Functionality
        searchLineBtn.addEventListener('click', () => {
            searchLineInputContainer.classList.toggle('hidden');
            if (!searchLineInputContainer.classList.contains('hidden')) {
                lineNumberInput.focus();
            }
        });

        gotoLineBtn.addEventListener('click', () => {
            const lineNumber = parseInt(lineNumberInput.value, 10);
            if (isNaN(lineNumber) || lineNumber < 1) {
                showMessageBox("Veuillez entrer un numéro de ligne valide.");
                return;
            }

            // Calculate scroll position for the target line
            // Line height is 1.2em, which is approximately 19.2px if font-size is 16px (0.9rem is smaller)
            // Let's use the actual computed line height for better accuracy
            const lineHeight = parseFloat(getComputedStyle(code1Textarea).lineHeight);
            const scrollPosition = (lineNumber - 1) * lineHeight;

            // Scroll both textareas and their associated elements
            code1Textarea.scrollTop = scrollPosition;
            lineNumbers1Div.scrollTop = scrollPosition;
            highlightedCode1Div.scrollTop = scrollPosition;

            code2Textarea.scrollTop = scrollPosition;
            lineNumbers2Div.scrollTop = scrollPosition;
            highlightedCode2Div.scrollTop = scrollPosition;

            // Hide the input after jumping
            searchLineInputContainer.classList.add('hidden');
            lineNumberInput.value = ''; // Clear input
        });

        // Close search input if clicked outside
        document.addEventListener('click', (event) => {
            if (!searchLineBtn.contains(event.target) && !searchLineInputContainer.contains(event.target) && !event.target.closest('.message-box-overlay')) {
                searchLineInputContainer.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
