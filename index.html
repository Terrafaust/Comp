<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/dracula.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; /* Darker background for scrollbar track */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; /* Greyish thumb */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a677d; /* Lighter grey on hover */
        }

        .code-area-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden; /* Ensure content doesn't spill */
            position: relative;
        }

        /* CodeMirror specific styling */
        .CodeMirror {
            height: 100%; /* Make CodeMirror fill its container */
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.2em;
            background-color: #1a202c; /* Match overall dark theme */
            border-radius: 0.5rem; /* Rounded corners for editor */
        }

        /* Adjust line numbers styling */
        .CodeMirror-gutters {
            background-color: #1a202c; /* Match editor background */
            border-right: 1px solid #2d3748; /* Separator */
        }
        .CodeMirror-linenumber {
            color: #888; /* Default line number color */
            padding-right: 8px; /* Padding to keep numbers close to text */
            text-align: right; /* Align numbers to the right */
        }

        /* Custom line number highlighting for comparison */
        .CodeMirror-linenumber.same-line {
            background-color: rgba(74, 222, 128, 0.3); /* Green for identical lines */
            color: #d1fae5; /* Lighter text for contrast */
        }

        .CodeMirror-linenumber.similar-line {
            background-color: rgba(96, 165, 250, 0.3); /* Blue for similar lines */
            color: #bfdbfe; /* Lighter text for contrast */
        }

        .CodeMirror-linenumber.different-line {
            background-color: rgba(239, 68, 68, 0.3); /* Red for different lines */
            color: #fee2e2; /* Lighter text for contrast */
        }

        /* Highlight for differences in code content */
        .CodeMirror-line.diff-line {
            background-color: rgba(74, 222, 128, 0.2); /* Green highlight for differences in code content */
        }

        /* Drag and Drop styles */
        .drag-over {
            border: 2px dashed #4ade80; /* Green dashed border */
            background-color: rgba(74, 222, 128, 0.1); /* Light green background */
        }

        /* Hide the actual file input, use a custom button */
        .hidden-file-input {
            display: none;
        }

        /* Custom modal for messages */
        .message-box-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .message-box-content {
            background-color: #1a202c;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: #f8f8f2;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen">

    <nav class="bg-gray-800 p-4 shadow-lg rounded-b-lg">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center space-y-2 sm:space-y-0">

            <div class="flex flex-wrap justify-center sm:justify-end gap-3">
                <button id="syncScrollBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75">

                        <button id="gotoLineBtn" class="ml-2 px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-md shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-75">Go</button>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path fill-rule="evenodd" d="M19.902 4.098a3.75 3.75 0 00-5.304 0l-9.294 9.293a3.75 3.75 0 00-.91 3.757l1.025 2.751a.75.75 0 00.928.387l2.751-1.025a3.75 3.75 0 003.757-.91l9.293-9.295a3.75 3.75 0 000-5.304zm-4.929 6.746l-7.293 7.293a.75.75 0 01-1.06 0l-1.025-1.025a.75.75 0 010-1.06l7.293-7.293a.75.75 0 011.06 0l1.025 1.025a.75.75 0 010 1.06z" clip-rule="evenodd" />
                    </svg>
                    <span>Portail Terra</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex flex-1 flex-col lg:flex-row p-4 gap-4">
        <section id="editor1" class="code-area-container flex-1 bg-gray-800 rounded-lg shadow-xl overflow-hidden">
            <div id="codeMirrorContainer1" class="w-full h-full"></div>
            <input type="file" id="fileInput1" class="hidden-file-input" accept=".txt,.html,.css,.js,.json,.xml,.md,.py,.java,.c,.cpp,.php,.rb,.sh,.yml,.ts,.jsx,.tsx,.vue,.go,.swift,.kt,.sql,.r,.dart,.scss,.less,.sass,.json,.xml,.yaml,.ini,.conf,.log,.csv,.tsv,.diff,.patch,.gitignore,.dockerfile,.env,.editorconfig,.prettierrc,.eslintrc,.browserslistrc,.npmrc,.yarnrc,.bowerrc,.gitattributes,.gitmodules,.npmignore,.yarnignore,.flowconfig,.babelrc,.tsconfig.json,.webmanifest,.webapp,.appcache,.build.gradle,.pom.xml,.gradlew,.gradlew.bat,.mvnw,.mvnw.cmd,.properties,.toml,.lock,.map,.min.js,.min.css,.woff,.woff2,.ttf,.otf,.eot,.svg,.png,.jpg,.jpeg,.gif,.bmp,.ico,.webp,.mp3,.wav,.ogg,.mp4,.webm,.avi,.mov,.wmv,.flv,.mkv,.zip,.rar,.7z,.tar,.gz,.bz2,.xz,.pdf,.docx,.xlsx,.pptx">

            <input type="file" id="fileInput2" class="hidden-file-input" accept=".txt,.html,.css,.js,.json,.xml,.md,.py,.java,.c,.cpp,.php,.rb,.sh,.yml,.ts,.jsx,.tsx,.vue,.go,.swift,.kt,.sql,.r,.dart,.scss,.less,.sass,.json,.xml,.yaml,.ini,.conf,.log,.csv,.tsv,.diff,.patch,.gitignore,.dockerfile,.env,.editorconfig,.prettierrc,.eslintrc,.browserslistrc,.npmrc,.yarnrc,.bowerrc,.gitattributes,.gitmodules,.npmignore,.yarnignore,.flowconfig,.babelrc,.tsconfig.json,.webmanifest,.webapp,.appcache,.build.gradle,.pom.xml,.gradlew,.gradlew.bat,.mvnw,.mvnw.cmd,.properties,.toml,.lock,.map,.min.js,.min.css,.woff,.woff2,.ttf,.otf,.eot,.svg,.png,.jpg,.jpeg,.gif,.bmp,.ico,.webp,.mp3,.wav,.ogg,.mp4,.webm,.avi,.mov,.wmv,.flv,.mkv,.zip,.rar,.7z,.tar,.gz,.bz2,.xz,.pdf,.docx,.xlsx,.pptx">
            <button id="importFileBtn2" class="absolute bottom-4 right-4 px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded-md shadow-lg transition duration-300">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/xml/xml.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/clike/clike.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/php/php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/ruby/ruby.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/shell/shell.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/json/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/go/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/swift/swift.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/r/r.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/dart/dart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/sass/sass.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/typescript/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/jsx/jsx.min.js"></script> <script>
        // Initialize CodeMirror instances
        const editor1 = CodeMirror(document.getElementById('codeMirrorContainer1'), {
            lineNumbers: true,
            mode: "javascript", // Default mode, will be updated based on file type
            theme: "dracula",
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            readOnly: false, // Allow editing
            autofocus: true,
            // Addons for better experience (optional, but good to have)
            matchBrackets: true,
            autoCloseBrackets: true,
            extraKeys: { "Ctrl-Space": "autocomplete" } // Example for autocompletion
        });

        const editor2 = CodeMirror(document.getElementById('codeMirrorContainer2'), {
            lineNumbers: true,
            mode: "javascript", // Default mode
            theme: "dracula",
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            readOnly: false, // Allow editing
            // Addons for better experience
            matchBrackets: true,
            autoCloseBrackets: true,
            extraKeys: { "Ctrl-Space": "autocomplete" }
        });

        // Get other DOM elements
        const syncScrollBtn = document.getElementById('syncScrollBtn');
        const compareBtn = document.getElementById('compareBtn');
        const clearBtn = document.getElementById('clearBtn');
        const editor1Section = document.getElementById('editor1');
        const editor2Section = document.getElementById('editor2');
        const fileInput1 = document.getElementById('fileInput1');
        const fileInput2 = document.getElementById('fileInput2');
        const importFileBtn1 = document.getElementById('importFileBtn1');
        const importFileBtn2 = document.getElementById('importFileBtn2');
        const searchLineBtn = document.getElementById('searchLineBtn');
        const searchLineInputContainer = document.getElementById('searchLineInputContainer');
        const lineNumberInput = document.getElementById('lineNumberInput');
        const gotoLineBtn = document.getElementById('gotoLineBtn');

        let syncScrollEnabled = false;
        let isComparing = false; // State to track if comparison is active

        // Function to get CodeMirror mode from file extension
        function getCodeMirrorModeFromFilename(filename) {
            const parts = filename.split('.');
            if (parts.length > 1) {
                const ext = parts[parts.length - 1].toLowerCase();
                switch (ext) {
                    case 'js': return 'javascript';
                    case 'html':
                    case 'htm': return 'xml';
                    case 'css': return 'css';
                    case 'json': return 'application/json'; // Specific MIME type for JSON
                    case 'py': return 'python';
                    case 'java': return 'text/x-java';
                    case 'c': return 'text/x-csrc';
                    case 'cpp': return 'text/x-c++src';
                    case 'php': return 'php';
                    case 'rb': return 'ruby';
                    case 'sh': return 'shell';
                    case 'md': return 'markdown';
                    case 'ts': return 'typescript';
                    case 'jsx': return 'jsx';
                    case 'tsx': return 'text/typescript';
                    case 'vue': return 'text/x-vue'; // Vue mode might need specific addon, falling back to XML
                    case 'go': return 'go';
                    case 'swift': return 'swift';
                    case 'kt': return 'text/x-kotlin';
                    case 'sql': return 'sql';
                    case 'r': return 'r';
                    case 'dart': return 'dart';
                    case 'scss': return 'text/x-scss';
                    case 'less': return 'text/x-less';
                    case 'sass': return 'text/x-sass';
                    case 'yaml':
                    case 'yml': return 'yaml';
                    case 'xml': return 'xml';
                    case 'txt': return 'text/plain'; // Plain text mode
                    case 'docx': return 'text/plain'; // Handle Word docs as plain text
                    default: return 'text/plain';
                }
            }
            return 'text/plain';
        }

        // Function to update editor content and mode
        function updateEditorContentAndMode(editorInstance, content, filename = '') {
            editorInstance.setValue(content);
            const mode = getCodeMirrorModeFromFilename(filename);
            editorInstance.setOption("mode", mode);
            editorInstance.refresh(); // Important for CodeMirror to re-render correctly
        }

        // Event listeners for CodeMirror content changes
        editor1.on('change', () => {
            checkCompareButtonState();
            if (isComparing) {
                compareCodes();
            } else {
                clearDiffHighlights();
            }
        });
        editor2.on('change', () => {
            checkCompareButtonState();
            if (isComparing) {
                compareCodes();
            } else {
                clearDiffHighlights();
            }
        });


        // Synchronized Scrolling
        // CodeMirror's `scroll` event provides scrollInfo object
        editor1.on('scroll', (instance) => {
            if (syncScrollEnabled) {
                const scrollInfo = instance.getScrollInfo();
                editor2.scrollTo(scrollInfo.left, scrollInfo.top);
            }
        });

        editor2.on('scroll', (instance) => {
            if (syncScrollEnabled) {
                const scrollInfo = instance.getScrollInfo();
                editor1.scrollTo(scrollInfo.left, scrollInfo.top);
            }
        });


        syncScrollBtn.addEventListener('click', () => {
            syncScrollEnabled = !syncScrollEnabled;
            syncScrollBtn.textContent = syncScrollEnabled ? 'Défilement Synchronisé (Activé)' : 'Mettre les lignes au même niveau';
            syncScrollBtn.classList.toggle('bg-blue-600', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('bg-blue-800', syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-700', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-900', syncScrollEnabled);

            // If enabling sync scroll, ensure both are at the same scroll position
            if (syncScrollEnabled) {
                const scrollInfo1 = editor1.getScrollInfo();
                editor2.scrollTo(scrollInfo1.left, scrollInfo1.top);
            }
        });

        // Comparison Logic
        function clearDiffHighlights() {
            isComparing = false; // Reset comparison state
            // Clear line content highlights
            editor1.eachLine(line => editor1.removeLineClass(line, 'background', 'diff-line'));
            editor2.eachLine(line => editor2.removeLineClass(line, 'background', 'diff-line'));

            // Clear line number highlights
            editor1.eachLine(line => editor1.removeLineClass(line, 'gutter', 'same-line'));
            editor1.eachLine(line => editor1.removeLineClass(line, 'gutter', 'similar-line'));
            editor1.eachLine(line => editor1.removeLineClass(line, 'gutter', 'different-line'));

            editor2.eachLine(line => editor2.removeLineClass(line, 'gutter', 'same-line'));
            editor2.eachLine(line => editor2.removeLineClass(line, 'gutter', 'similar-line'));
            editor2.eachLine(line => editor2.removeLineClass(line, 'gutter', 'different-line'));
        }

        function compareCodes() {
            clearDiffHighlights(); // Clear previous highlights first
            isComparing = true; // Set comparison state to true

            const lines1 = editor1.getValue().split('\n');
            const lines2 = editor2.getValue().split('\n');

            const maxLength = Math.max(lines1.length, lines2.length);

            for (let i = 0; i < maxLength; i++) {
                const line1 = lines1[i] ? lines1[i].trim() : ''; // Trim whitespace for comparison
                const line2 = lines2[i] ? lines2[i].trim() : '';

                const cmLine1 = editor1.getLineHandle(i);
                const cmLine2 = editor2.getLineHandle(i);

                if (line1 === line2) {
                    // Identical lines: Green for line numbers
                    if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'same-line');
                    if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'same-line');
                } else {
                    // Lines are different: Apply general diff highlight to content
                    if (cmLine1) editor1.addLineClass(cmLine1, 'background', 'diff-line');
                    if (cmLine2) editor2.addLineClass(cmLine2, 'background', 'diff-line');

                    // Check for common words for 'similar' classification
                    // Tokenize and clean words, convert to lowercase for case-insensitive comparison
                    const words1 = new Set(line1.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0));
                    const words2 = new Set(line2.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0));

                    let hasCommonWord = false;
                    for (const word of words1) {
                        if (words2.has(word)) {
                            hasCommonWord = true;
                            break;
                        }
                    }

                    if (hasCommonWord) {
                        // Similar lines: Blue for line numbers
                        if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'similar-line');
                        if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'similar-line');
                    } else {
                        // Completely different lines: Red for line numbers
                        if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'different-line');
                        if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'different-line');
                    }
                }
            }
        }

        compareBtn.addEventListener('click', compareCodes);

        // Check if compare button should be enabled
        function checkCompareButtonState() {
            if (editor1.getValue().trim() !== '' && editor2.getValue().trim() !== '') {
                compareBtn.disabled = false;
                compareBtn.classList.remove('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                compareBtn.disabled = true;
                compareBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                clearDiffHighlights(); // Clear highlights if one editor becomes empty
                isComparing = false; // Reset comparison state
            }
        }

        // Initial check for compare button state
        checkCompareButtonState();

        // Clear All button
        clearBtn.addEventListener('click', () => {
            editor1.setValue('');
            editor2.setValue('');
            editor1.setOption("mode", "javascript"); // Reset mode
            editor2.setOption("mode", "javascript"); // Reset mode
            checkCompareButtonState();
            clearDiffHighlights();
            isComparing = false;
            // Reset sync scroll button state
            syncScrollEnabled = false;
            syncScrollBtn.textContent = 'Mettre les lignes au même niveau';
            syncScrollBtn.classList.remove('bg-blue-800', 'hover:bg-blue-900');
            syncScrollBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
        });

        // File Input Handling
        function handleFile(file, editorInstance) {
            const reader = new FileReader();
            reader.onload = (e) => {
                updateEditorContentAndMode(editorInstance, e.target.result, file.name);
                checkCompareButtonState();
                if (isComparing) {
                    compareCodes();
                } else {
                    clearDiffHighlights();
                }
            };
            if (file.name.endsWith('.docx')) {
                reader.readAsText(file); // This will likely result in garbled text for binary docx
                showMessageBox("Les documents Word (.docx) seront affichés en texte brut, leur formatage riche n'est pas pris en charge pour la comparaison de code.");
            } else {
                reader.readAsText(file);
            }
        }

        // Custom Message Box (instead of alert)
        function showMessageBox(message) {
            const messageBox = document.createElement('div');
            messageBox.className = 'message-box-overlay';
            messageBox.innerHTML = `
                <div class="message-box-content">
                    <p class="mb-4">${message}</p>
                    <button id="closeMessageBox" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md">OK</button>
                </div>
            `;
            document.body.appendChild(messageBox);

            document.getElementById('closeMessageBox').addEventListener('click', () => {
                document.body.removeChild(messageBox);
            });
        }

        // Event listeners for "Importer Fichier" buttons
        importFileBtn1.addEventListener('click', () => {
            fileInput1.click(); // This should trigger the file browser
        });

        importFileBtn2.addEventListener('click', () => {
            fileInput2.click(); // This should trigger the file browser
        });

        fileInput1.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, editor1);
            }
        });

        fileInput2.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, editor2);
            }
        });

        // Drag and Drop Handling
        function setupDragAndDrop(editorSection, editorInstance) {
            editorSection.addEventListener('dragover', (e) => {
                e.preventDefault();
                editorSection.classList.add('drag-over');
            });

            editorSection.addEventListener('dragleave', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
            });

            editorSection.addEventListener('drop', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file) {
                    handleFile(file, editorInstance);
                }
            });
        }

        setupDragAndDrop(editor1Section, editor1);
        setupDragAndDrop(editor2Section, editor2);

        // Line Search Functionality
        searchLineBtn.addEventListener('click', () => {
            searchLineInputContainer.classList.toggle('hidden');
            if (!searchLineInputContainer.classList.contains('hidden')) {
                lineNumberInput.focus();
            }
        });

        gotoLineBtn.addEventListener('click', () => {
            const lineNumber = parseInt(lineNumberInput.value, 10);
            if (isNaN(lineNumber) || lineNumber < 1) {
                showMessageBox("Veuillez entrer un numéro de ligne valide.");
                return;
            }

            // CodeMirror lines are 0-indexed
            const lineIndex = lineNumber - 1;

            // Scroll both editors to the target line
            editor1.scrollIntoView({ line: lineIndex, char: 0 }, 50); // 50px padding from top
            editor2.scrollIntoView({ line: lineIndex, char: 0 }, 50);

            // Hide the input after jumping
            searchLineInputContainer.classList.add('hidden');
            lineNumberInput.value = ''; // Clear input
        });

        // Close search input if clicked outside
        document.addEventListener('click', (event) => {
            if (!searchLineBtn.contains(event.target) && !searchLineInputContainer.contains(event.target) && !event.target.closest('.message-box-overlay')) {
                searchLineInputContainer.classList.add('hidden');
            }
        });

        // Initial setup for CodeMirror to ensure it's ready
        window.addEventListener('load', () => {
            editor1.refresh();
            editor2.refresh();
            checkCompareButtonState(); // Ensure button state is correct on load
        });

    </script>
</body>
</html>
