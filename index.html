<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparateur de Code</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.5/lib/codemirror.css">
    <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.5/theme/dracula.css">

    <style>
        /* Styles généraux pour le corps de la page */
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #1a202c; /* Couleur de fond principale sombre */
            color: #f8f8f2; /* Couleur de texte claire par défaut */
        }

        /* Personnalisation de la barre de défilement pour une meilleure esthétique */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3748; /* Fond plus foncé pour la piste de défilement */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568; /* Pouce grisâtre */
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a677d; /* Gris plus clair au survol */
        }

        /* Conteneur principal pour les zones de code */
        .code-area-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden; /* Empêche le débordement du contenu */
            position: relative; /* Nécessaire pour le positionnement absolu des éléments internes */
        }

        /* Styles spécifiques à CodeMirror */
        .CodeMirror {
            height: 100%; /* Fait en sorte que CodeMirror remplisse son conteneur */
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace; /* Police mono-espacée pour le code */
            font-size: 0.9rem;
            line-height: 1.2em;
            background-color: #1a202c; /* Correspond au thème sombre général */
            border-radius: 0.5rem; /* Coins arrondis pour l'éditeur */
        }

        /* Ajustement du style des numéros de ligne de CodeMirror */
        .CodeMirror-gutters {
            background-color: #1a202c; /* Correspond au fond de l'éditeur */
            border-right: 1px solid #2d3748; /* Séparateur */
        }
        .CodeMirror-linenumber {
            color: #888; /* Couleur par défaut des numéros de ligne */
            padding-right: 8px; /* Espacement pour rapprocher les numéros du texte */
            text-align: right; /* Alignement des numéros à droite */
        }

        /* Mise en évidence personnalisée des numéros de ligne pour la comparaison */
        .CodeMirror-linenumber.same-line {
            background-color: rgba(74, 222, 128, 0.3); /* Vert pour les lignes identiques */
            color: #d1fae5; /* Texte plus clair pour le contraste */
        }

        .CodeMirror-linenumber.similar-line {
            background-color: rgba(96, 165, 250, 0.3); /* Bleu pour les lignes similaires */
            color: #bfdbfe; /* Texte plus clair pour le contraste */
        }

        .CodeMirror-linenumber.different-line {
            background-color: rgba(239, 68, 68, 0.3); /* Rouge pour les lignes différentes */
            color: #fee2e2; /* Texte plus clair pour le contraste */
        }

        /* Mise en évidence du contenu des lignes pour les différences */
        .CodeMirror-line.diff-line {
            background-color: rgba(74, 222, 128, 0.2); /* Surlignage vert pour les différences de contenu */
        }

        /* Styles pour le glisser-déposer */
        .drag-over {
            border: 2px dashed #4ade80; /* Bordure verte en pointillés */
            background-color: rgba(74, 222, 128, 0.1); /* Fond vert clair */
        }

        /* Masque l'entrée de fichier native, utilise un bouton personnalisé */
        .hidden-file-input {
            display: none;
        }

        /* Styles pour la boîte de message personnalisée (modale) */
        .message-box-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75); /* Fond semi-transparent */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000; /* Assure que la modale est au-dessus de tout */
        }

        .message-box-content {
            background-color: #1a202c; /* Fond sombre pour la boîte */
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: #f8f8f2;
            max-width: 400px;
            width: 90%;
        }

        /* --- Styles pour la coloration syntaxique (VS Code-like) --- */
        /* Ces règles sont ajoutées avec !important pour s'assurer qu'elles ne sont pas écrasées */
        /* Elles reproduisent les couleurs du thème Dracula, ajustées pour ressembler davantage à VS Code */

        /* Mots-clés (e.g., function, const, if, var, let, return, new, import, export) */
        .CodeMirror.cm-s-dracula .cm-keyword { color: #ff79c6 !important; } /* Rose */
        /* Objets/fonctions intégrés (e.g., document, console, window, setTimeout, parseInt) */
        .CodeMirror.cm-s-dracula .cm-builtin { color: #8be9fd !important; } /* Cyan */
        /* Atomes (e.g., true, false, null, undefined) */
        .CodeMirror.cm-s-dracula .cm-atom { color: #bd93f9 !important; } /* Violet */
        /* Nombres */
        .CodeMirror.cm-s-dracula .cm-number { color: #bd93f9 !important; } /* Violet */

        /* Noms de fonctions, classes, identifiants */
        .CodeMirror.cm-s-dracula .cm-def { color: #50fa7b !important; } /* Vert pour les définitions (e.g., noms de fonctions déclarées) */
        /* Variables générales */
        .CodeMirror.cm-s-dracula .cm-variable { color: #f8f8f2 !important; } /* Blanc/gris clair */
        /* Variables de second niveau (souvent paramètres ou variables locales) */
        .CodeMirror.cm-s-dracula .cm-variable-2 { color: #8be9fd !important; } /* Cyan */
        /* Variables de troisième niveau */
        .CodeMirror.cm-s-dracula .cm-variable-3 { color: #8be9fd !important; } /* Cyan */
        /* Propriétés d'objets (e.g., .getElementById, .value, .classList) */
        .CodeMirror.cm-s-dracula .cm-property { color: #8be9fd !important; } /* Cyan */
        /* Types (e.g., class names, type annotations en TypeScript) */
        .CodeMirror.cm-s-dracula .cm-type { color: #8be9fd !important; } /* Cyan */

        /* Chaînes de caractères */
        .CodeMirror.cm-s-dracula .cm-string { color: #f1fa8c !important; } /* Jaune */
        /* Chaînes secondaires/multilignes */
        .CodeMirror.cm-s-dracula .cm-string-2 { color: #f1fa8c !important; } /* Jaune */
        /* Interpolation de chaînes */
        .CodeMirror.cm-s-dracula .cm-string-interpolation { color: #f1fa8c !important; } /* Jaune */

        /* Commentaires */
        .CodeMirror.cm-s-dracula .cm-comment { color: #6272a4 !important; } /* Gris-bleu */

        /* Opérateurs (e.g., =, +, ==, &&, ||, !) */
        .CodeMirror.cm-s-dracula .cm-operator { color: #ff79c6 !important; } /* Rose */

        /* Métadonnées (e.g., @media, #include, @keyframes) */
        .CodeMirror.cm-s-dracula .cm-meta { color: #ffb86c !important; } /* Orange */
        /* Qualificateurs (e.g., sélecteurs de classe en CSS comme .dark-theme) */
        .CodeMirror.cm-s-dracula .cm-qualifier { color: #50fa7b !important; } /* Vert */

        /* Balises HTML/XML (e.g., <html>, <head>, <div>, <button>, <span>) */
        .CodeMirror.cm-s-dracula .cm-tag { color: #ff79c6 !important; } /* Rose */
        /* Attributs HTML/XML (e.g., lang, id, style, class, display) */
        .CodeMirror.cm-s-dracula .cm-attribute { color: #50fa7b !important; } /* Vert */
        /* Chevrons des balises HTML/XML (e.g., < et >) */
        .CodeMirror.cm-s-dracula .cm-tag.cm-bracket { color: #f8f8f2 !important; } /* Blanc/gris clair */

        /* Sélecteurs CSS (e.g., body, .container, #side-menu) */
        /* Note: CodeMirror peut tokeniser les sélecteurs complexes différemment. */
        .CodeMirror.cm-s-dracula .cm-header { color: #ff79c6 !important; } /* Rose pour les sélecteurs de type (e.g., body, div) */
        .CodeMirror.cm-s-dracula .cm-selector { color: #8be9fd !important; } /* Cyan pour les sélecteurs de classe/ID */
        /* Propriétés CSS (e.g., background-color, padding, border-radius) */
        .CodeMirror.cm-s-dracula .cm-property { color: #8be9fd !important; } /* Cyan */
        /* Valeurs CSS (e.g., white, #3a3a3a, 10px, solid, pointer) */
        .CodeMirror.cm-s-dracula .cm-variable-2 { color: #f1fa8c !important; } /* Jaune pour les valeurs */
        .CodeMirror.cm-s-dracula .cm-atom { color: #bd93f9 !important; } /* Violet pour les mots-clés CSS comme 'solid', 'pointer' */
        .CodeMirror.cm-s-dracula .cm-unit { color: #bd93f9 !important; } /* Violet pour les unités (px, %, s) */

        /* En-têtes Markdown, liens */
        .CodeMirror.cm-s-dracula .cm-header { color: #bd93f9 !important; } /* Violet */
        .CodeMirror.cm-s-dracula .cm-link { color: #8be9fd !important; } /* Cyan */

        /* Erreurs */
        .CodeMirror.cm-s-dracula .cm-error { color: #ff5555 !important; } /* Rouge */

        /* Crochets, parenthèses, accolades, ponctuation */
        .CodeMirror.cm-s-dracula .cm-bracket { color: #cccccc !important; } /* Gris clair pour les parenthèses, crochets, accolades */
        .CodeMirror.cm-s-dracula .cm-punctuation { color: #f8f8f2 !important; } /* Blanc/gris clair pour la ponctuation générale (e.g., virgules, points-virgules) */
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen">

    <nav class="bg-gray-800 p-4 shadow-lg rounded-b-lg">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center space-y-2 sm:space-y-0">
            <h1 class="text-xl font-bold text-teal-400">Comparateur de Code <span class="text-sm text-gray-400">(en utilisant la bibliothèque CodeMirror)</span></h1>
            <div class="flex flex-wrap justify-center sm:justify-end gap-3">
                <button id="syncScrollBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75">
                    Défilement synchronisé (Désactivé)

                    Effacer Tout

                <div class="relative">
                    <button id="searchLineBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-75">
                        Rechercher Ligne

                    <div id="searchLineInputContainer" class="absolute top-full right-0 mt-2 bg-gray-800 rounded-md shadow-lg p-4 z-10 hidden flex items-center">
                        <input type="number" id="lineNumberInput" class="bg-gray-700 text-white rounded-md p-2 w-24 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="N° ligne" min="1">
                        <button id="gotoLineBtn" class="ml-2 px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-md shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-75">Go</button>
                    </div>
                </div>
                <a href="https://terrafaust.github.io/T" target="_blank" rel="noopener noreferrer" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-white text-sm rounded-md shadow-lg transition duration-300 flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path fill-rule="evenodd" d="M19.902 4.098a3.75 3.75 0 00-5.304 0l-9.294 9.293a3.75 3.75 0 00-.91 3.757l1.025 2.751a.75.75 0 00.928.387l2.751-1.025a3.75 3.75 0 003.757-.91l9.293-9.295a3.75 3.75 0 000-5.304zm-4.929 6.746l-7.293 7.293a.75.75 0 01-1.06 0l-1.025-1.025a.75.75 0 010-1.06l7.293-7.293a.75.75 0 011.06 0l1.025 1.025a.75.75 0 010 1.06z" clip-rule="evenodd" />
                    </svg>
                    <span>Portail Terra</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex flex-1 flex-col lg:flex-row p-4 gap-4">
        <section id="editor1" class="code-area-container flex-1 bg-gray-800 rounded-lg shadow-xl overflow-hidden">
            <div id="codeMirrorContainer1" class="w-full h-full"></div>
            <input type="file" id="fileInput1" class="hidden-file-input" accept=".txt,.html,.css,.js,.json,.xml,.md,.py,.java,.c,.cpp,.php,.rb,.sh,.yml,.ts,.jsx,.tsx,.vue,.go,.swift,.kt,.sql,.r,.dart,.scss,.less,.sass,.json,.xml,.yaml,.ini,.conf,.log,.csv,.tsv,.diff,.patch,.gitignore,.dockerfile,.env,.editorconfig,.prettierrc,.eslintrc,.browserslistrc,.npmrc,.yarnrc,.bowerrc,.gitattributes,.gitmodules,.npmignore,.yarnignore,.flowconfig,.babelrc,.tsconfig.json,.webmanifest,.webapp,.appcache,.build.gradle,.pom.xml,.gradlew,.gradlew.bat,.mvnw,.mvnw.cmd,.properties,.toml,.lock,.map,.min.js,.min.css,.woff,.woff2,.ttf,.otf,.eot,.svg,.png,.jpg,.jpeg,.gif,.bmp,.ico,.webp,.mp3,.wav,.ogg,.mp4,.webm,.avi,.mov,.wmv,.flv,.mkv,.zip,.rar,.7z,.tar,.gz,.bz2,.xz,.pdf,.docx,.xlsx,.pptx">

        <section id="editor2" class="code-area-container flex-1 bg-gray-800 rounded-lg shadow-xl overflow-hidden">
            <div id="codeMirrorContainer2" class="w-full h-full"></div>
            <input type="file" id="fileInput2" class="hidden-file-input" accept=".txt,.html,.css,.js,.json,.xml,.md,.py,.java,.c,.cpp,.php,.rb,.sh,.yml,.ts,.jsx,.tsx,.vue,.go,.swift,.kt,.sql,.r,.dart,.scss,.less,.sass,.json,.xml,.yaml,.ini,.conf,.log,.csv,.tsv,.diff,.patch,.gitignore,.dockerfile,.env,.editorconfig,.prettierrc,.eslintrc,.browserslistrc,.npmrc,.yarnrc,.bowerrc,.gitattributes,.gitmodules,.npmignore,.yarnignore,.flowconfig,.babelrc,.tsconfig.json,.webmanifest,.webapp,.appcache,.build.gradle,.pom.xml,.gradlew,.gradlew.bat,.mvnw,.mvnw.cmd,.properties,.toml,.lock,.map,.min.js,.min.css,.woff,.woff2,.ttf,.otf,.eot,.svg,.png,.jpg,.jpeg,.gif,.bmp,.ico,.webp,.mp3,.wav,.ogg,.mp4,.webm,.avi,.mov,.wmv,.flv,.mkv,.zip,.rar,.7z,.tar,.gz,.bz2,.xz,.pdf,.docx,.xlsx,.pptx">

            <span class="text-left">Comparateur de Code</span>
            <span class="text-right">Créé par Terrafaust & IA</span>
        </div>

    <script src="https://unpkg.com/codemirror@5.65.5/lib/codemirror.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/javascript/javascript.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/xml/xml.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/css/css.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/python/python.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/clike/clike.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/php/php.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/ruby/ruby.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/shell/shell.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/markdown/markdown.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/sql/sql.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/yaml/yaml.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/json/json.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/go/go.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/swift/swift.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/r/r.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/dart/dart.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/sass/sass.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/typescript/typescript.js"></script>
    <script src="https://unpkg.com/codemirror@5.65.5/mode/jsx/jsx.js"></script>

    <script>
        // Initialisation des instances CodeMirror pour les deux éditeurs
        const editor1 = CodeMirror(document.getElementById('codeMirrorContainer1'), {
            lineNumbers: true, // Affiche les numéros de ligne
            mode: "javascript", // Mode par défaut, sera mis à jour selon le type de fichier
            theme: "dracula", // Thème sombre (Dracula)
            indentUnit: 4, // Taille de l'indentation
            tabSize: 4, // Taille des tabulations
            lineWrapping: false, // Empêche le retour à la ligne automatique
            readOnly: false, // Permet l'édition
            autofocus: true, // Met le focus sur l'éditeur au chargement
            matchBrackets: true, // Surligne les parenthèses/crochets correspondants
            autoCloseBrackets: true, // Ferme automatiquement les parenthèses/crochets
        });

        const editor2 = CodeMirror(document.getElementById('codeMirrorContainer2'), {
            lineNumbers: true,
            mode: "javascript",
            theme: "dracula",
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: false,
            readOnly: false,
            matchBrackets: true,
            autoCloseBrackets: true,
        });

        // Récupération des autres éléments du DOM
        const syncScrollBtn = document.getElementById('syncScrollBtn');
        const compareBtn = document.getElementById('compareBtn');
        const clearBtn = document.getElementById('clearBtn');
        const editor1Section = document.getElementById('editor1');
        const editor2Section = document.getElementById('editor2');
        const fileInput1 = document.getElementById('fileInput1');
        const fileInput2 = document.getElementById('fileInput2');
        const importFileBtn1 = document.getElementById('importFileBtn1');
        const importFileBtn2 = document.getElementById('importFileBtn2');
        const searchLineBtn = document.getElementById('searchLineBtn');
        const searchLineInputContainer = document.getElementById('searchLineInputContainer');
        const lineNumberInput = document.getElementById('lineNumberInput');
        const gotoLineBtn = document.getElementById('gotoLineBtn');

        let syncScrollEnabled = false;
        let isComparing = false; // État pour suivre si la comparaison est active

        /**
         * Détermine le mode CodeMirror approprié en fonction de l'extension du nom de fichier.
         * @param {string} filename - Le nom du fichier.
         * @returns {string} Le mode CodeMirror ou 'text/plain' par défaut.
         */
        function getCodeMirrorModeFromFilename(filename) {
            const parts = filename.split('.');
            if (parts.length > 1) {
                const ext = parts[parts.length - 1].toLowerCase();
                switch (ext) {
                    case 'js': return 'javascript';
                    case 'html': case 'htm': return 'xml';
                    case 'css': return 'css';
                    case 'json': return 'application/json';
                    case 'py': return 'python';
                    case 'java': return 'text/x-java';
                    case 'c': return 'text/x-csrc';
                    case 'cpp': return 'text/x-c++src';
                    case 'php': return 'php';
                    case 'rb': return 'ruby';
                    case 'sh': return 'shell';
                    case 'md': return 'markdown';
                    case 'ts': return 'typescript';
                    case 'jsx': return 'jsx';
                    case 'tsx': return 'text/typescript';
                    case 'vue': return 'text/x-vue'; // Mode Vue.js (nécessite l'addon si non inclus)
                    case 'go': return 'go';
                    case 'swift': return 'swift';
                    case 'kt': return 'text/x-kotlin';
                    case 'sql': return 'sql';
                    case 'r': return 'r';
                    case 'dart': return 'dart';
                    case 'scss': return 'text/x-scss';
                    case 'less': return 'text/x-less';
                    case 'sass': return 'text/x-sass';
                    case 'yaml': case 'yml': return 'yaml';
                    case 'xml': return 'xml';
                    case 'txt': return 'text/plain';
                    case 'docx': return 'text/plain'; // Les documents Word sont traités comme du texte brut
                    default: return 'text/plain';
                }
            }
            return 'text/plain';
        }

        /**
         * Met à jour le contenu et le mode d'une instance CodeMirror.
         * @param {CodeMirror.Editor} editorInstance - L'instance CodeMirror à mettre à jour.
         * @param {string} content - Le nouveau contenu du texte.
         * @param {string} [filename=''] - Le nom du fichier pour déterminer le mode.
         */
        function updateEditorContentAndMode(editorInstance, content, filename = '') {
            editorInstance.setValue(content);
            const mode = getCodeMirrorModeFromFilename(filename);
            editorInstance.setOption("mode", mode);
            editorInstance.refresh(); // Important pour que CodeMirror se redessine correctement
        }

        // Écouteurs d'événements pour les changements de contenu des éditeurs CodeMirror
        editor1.on('change', () => {
            checkCompareButtonState();
            if (isComparing) {
                compareCodes(); // Relance la comparaison si elle est active
            } else {
                clearDiffHighlights(); // Efface les surlignages si la comparaison n'est pas active
            }
        });
        editor2.on('change', () => {
            checkCompareButtonState();
            if (isComparing) {
                compareCodes();
            } else {
                clearDiffHighlights();
            }
        });

        // Synchronisation du défilement entre les deux éditeurs CodeMirror
        editor1.on('scroll', (instance) => {
            if (syncScrollEnabled) {
                const scrollInfo = instance.getScrollInfo();
                editor2.scrollTo(scrollInfo.left, scrollInfo.top);
            }
        });

        editor2.on('scroll', (instance) => {
            if (syncScrollEnabled) {
                const scrollInfo = instance.getScrollInfo();
                editor1.scrollTo(scrollInfo.left, scrollInfo.top);
            }
        });

        // Gestion du bouton "Défilement synchronisé"
        syncScrollBtn.addEventListener('click', () => {
            syncScrollEnabled = !syncScrollEnabled;
            syncScrollBtn.textContent = syncScrollEnabled ? 'Défilement synchronisé (Activé)' : 'Défilement synchronisé (Désactivé)';
            syncScrollBtn.classList.toggle('bg-blue-600', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('bg-blue-800', syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-700', !syncScrollEnabled);
            syncScrollBtn.classList.toggle('hover:bg-blue-900', syncScrollEnabled);

            // Si le défilement synchronisé est activé, assure que les deux éditeurs sont à la même position
            if (syncScrollEnabled) {
                const scrollInfo1 = editor1.getScrollInfo();
                editor2.scrollTo(scrollInfo1.left, scrollInfo1.top);
            }
        });

        /**
         * Efface tous les surlignages de différence et de numéros de ligne.
         */
        function clearDiffHighlights() {
            isComparing = false; // Réinitialise l'état de comparaison
            // Efface les surlignages de contenu de ligne
            editor1.eachLine(line => editor1.removeLineClass(line, 'background', 'diff-line'));
            editor2.eachLine(line => editor2.removeLineClass(line, 'background', 'diff-line'));

            // Efface les surlignages de numéros de ligne
            editor1.eachLine(line => {
                editor1.removeLineClass(line, 'gutter', 'same-line');
                editor1.removeLineClass(line, 'gutter', 'similar-line');
                editor1.removeLineClass(line, 'gutter', 'different-line');
            });
            editor2.eachLine(line => {
                editor2.removeLineClass(line, 'gutter', 'same-line');
                editor2.removeLineClass(line, 'gutter', 'similar-line');
                editor2.removeLineClass(line, 'gutter', 'different-line');
            });
        }

        /**
         * Compare les codes dans les deux éditeurs et applique les surlignages.
         * - Numéro de ligne vert si les lignes sont identiques.
         * - Numéro de ligne rouge si les lignes sont différentes (pas de mots en commun).
         * - Numéro de ligne bleu si les lignes sont similaires (au moins un mot en commun).
         * - Contenu de ligne vert clair si les lignes sont différentes.
         */
        function compareCodes() {
            clearDiffHighlights(); // Efface les surlignages précédents
            isComparing = true; // Définit l'état de comparaison à actif

            const lines1 = editor1.getValue().split('\n');
            const lines2 = editor2.getValue().split('\n');

            const maxLength = Math.max(lines1.length, lines2.length);

            for (let i = 0; i < maxLength; i++) {
                const line1 = lines1[i] ? lines1[i].trim() : ''; // Supprime les espaces blancs pour la comparaison
                const line2 = lines2[i] ? lines2[i].trim() : '';

                const cmLine1 = editor1.getLineHandle(i); // Référence à l'objet ligne de CodeMirror
                const cmLine2 = editor2.getLineHandle(i);

                if (line1 === line2) {
                    // Lignes identiques : Numéro de ligne en vert
                    if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'same-line');
                    if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'same-line');
                } else {
                    // Les lignes sont différentes : Surlignage général du contenu en vert clair
                    if (cmLine1) editor1.addLineClass(cmLine1, 'background', 'diff-line');
                    if (cmLine2) editor2.addLineClass(cmLine2, 'background', 'diff-line');

                    // Vérifie les mots en commun pour la classification 'similaire'
                    // Tokenise et nettoie les mots, convertit en minuscules pour une comparaison insensible à la casse
                    const words1 = new Set(line1.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0));
                    const words2 = new Set(line2.toLowerCase().split(/\s+|[.,;!?(){}[\]<>"'`:/\\]+/).filter(word => word.length > 0));

                    let hasCommonWord = false;
                    for (const word of words1) {
                        if (words2.has(word)) {
                            hasCommonWord = true;
                            break;
                        }
                    }

                    if (hasCommonWord) {
                        // Lignes similaires : Numéro de ligne en bleu
                        if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'similar-line');
                        if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'similar-line');
                    } else {
                        // Lignes complètement différentes : Numéro de ligne en rouge
                        if (cmLine1) editor1.addLineClass(cmLine1, 'gutter', 'different-line');
                        if (cmLine2) editor2.addLineClass(cmLine2, 'gutter', 'different-line');
                    }
                }
            }
        }

        compareBtn.addEventListener('click', compareCodes);

        /**
         * Vérifie l'état des éditeurs et active/désactive le bouton "Comparer" en conséquence.
         */
        function checkCompareButtonState() {
            if (editor1.getValue().trim() !== '' && editor2.getValue().trim() !== '') {
                compareBtn.disabled = false;
                compareBtn.classList.remove('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                compareBtn.disabled = true;
                compareBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
                compareBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                clearDiffHighlights(); // Efface les surlignages si un éditeur devient vide
                isComparing = false; // Réinitialise l'état de comparaison
            }
        }

        // Vérification initiale de l'état du bouton "Comparer" au chargement
        checkCompareButtonState();

        // Gestion du bouton "Effacer Tout"
        clearBtn.addEventListener('click', () => {
            editor1.setValue('');
            editor2.setValue('');
            editor1.setOption("mode", "javascript"); // Réinitialise le mode par défaut
            editor2.setOption("mode", "javascript"); // Réinitialise le mode par default
            checkCompareButtonState();
            clearDiffHighlights();
            isComparing = false;
            // Réinitialise l'état du bouton de défilement synchronisé
            syncScrollEnabled = false;
            syncScrollBtn.textContent = 'Défilement synchronisé (Désactivé)';
            syncScrollBtn.classList.remove('bg-blue-800', 'hover:bg-blue-900');
            syncScrollBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
        });

        /**
         * Gère le chargement d'un fichier dans un éditeur CodeMirror.
         * @param {File} file - Le fichier à charger.
         * @param {CodeMirror.Editor} editorInstance - L'instance CodeMirror cible.
         */
        function handleFile(file, editorInstance) {
            const reader = new FileReader();
            reader.onload = (e) => {
                updateEditorContentAndMode(editorInstance, e.target.result, file.name);
                checkCompareButtonState();
                if (isComparing) {
                    compareCodes();
                } else {
                    clearDiffHighlights();
                }
            };
            // Gestion spécifique pour les documents Word (.docx)
            if (file.name.endsWith('.docx')) {
                reader.readAsText(file); // Tente de lire comme texte (peut résulter en texte illisible pour les binaires)
                showMessageBox("Les documents Word (.docx) seront affichés en texte brut, leur formatage riche n'est pas pris en charge pour la comparaison de code.");
            } else {
                reader.readAsText(file);
            }
        }

        /**
         * Affiche une boîte de message personnalisée (modale) au lieu de l'alerte native du navigateur.
         * @param {string} message - Le message à afficher.
         */
        function showMessageBox(message) {
            const messageBox = document.createElement('div');
            messageBox.className = 'message-box-overlay';
            messageBox.innerHTML = `
                <div class="message-box-content">
                    <p class="mb-4">${message}</p>
                    <button id="closeMessageBox" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md">OK</button>
                </div>
            `;
            document.body.appendChild(messageBox);

            document.getElementById('closeMessageBox').addEventListener('click', () => {
                document.body.removeChild(messageBox);
            });
        }

        // Écouteurs d'événements pour les boutons "Importer Fichier"
        importFileBtn1.addEventListener('click', () => {
            fileInput1.click(); // Déclenche l'ouverture du sélecteur de fichiers
        });

        importFileBtn2.addEventListener('click', () => {
            fileInput2.click(); // Déclenche l'ouverture du sélecteur de fichiers
        });

        fileInput1.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, editor1);
            }
        });

        fileInput2.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFile(file, editor2);
            }
        });

        /**
         * Configure la fonctionnalité de glisser-déposer pour une section d'éditeur donnée.
         * @param {HTMLElement} editorSection - La section de l'éditeur (ex: editor1Section).
         * @param {CodeMirror.Editor} editorInstance - L'instance CodeMirror associée.
         */
        function setupDragAndDrop(editorSection, editorInstance) {
            editorSection.addEventListener('dragover', (e) => {
                e.preventDefault();
                editorSection.classList.add('drag-over');
            });

            editorSection.addEventListener('dragleave', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
            });

            editorSection.addEventListener('drop', (e) => {
                e.preventDefault();
                editorSection.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file) {
                    handleFile(file, editorInstance);
                }
            });
        }

        setupDragAndDrop(editor1Section, editor1);
        setupDragAndDrop(editor2Section, editor2);

        // Fonctionnalité de recherche de ligne
        searchLineBtn.addEventListener('click', () => {
            searchLineInputContainer.classList.toggle('hidden');
            if (!searchLineInputContainer.classList.contains('hidden')) {
                lineNumberInput.focus();
            }
        });

        gotoLineBtn.addEventListener('click', () => {
            const lineNumber = parseInt(lineNumberInput.value, 10);
            if (isNaN(lineNumber) || lineNumber < 1) {
                showMessageBox("Veuillez entrer un numéro de ligne valide.");
                return;
            }

            // Les lignes de CodeMirror sont indexées à partir de 0
            const lineIndex = lineNumber - 1;

            // Fait défiler les deux éditeurs à la ligne cible
            editor1.scrollIntoView({ line: lineIndex, char: 0 }, 50); // 50px de marge du haut
            editor2.scrollIntoView({ line: lineIndex, char: 0 }, 50);

            // Masque l'entrée après le saut
            searchLineInputContainer.classList.add('hidden');
            lineNumberInput.value = ''; // Efface l'entrée
        });

        // Ferme l'entrée de recherche si l'on clique en dehors
        document.addEventListener('click', (event) => {
            if (!searchLineBtn.contains(event.target) && !searchLineInputContainer.contains(event.target) && !event.target.closest('.message-box-overlay')) {
                searchLineInputContainer.classList.add('hidden');
            }
        });

        // Configuration initiale de CodeMirror pour s'assurer qu'il est prêt au chargement
        window.addEventListener('load', () => {
            editor1.refresh(); // Force le rafraîchissement des éditeurs
            editor2.refresh();
            checkCompareButtonState(); // Assure que l'état du bouton est correct au chargement
        });

        // Avertissement pour l'utilisation du CDN Tailwind CSS en production (pour information)
        console.warn("L'utilisation du CDN Tailwind CSS n'est pas recommandée en production pour des performances optimales. Pour un déploiement en production, installez-le comme plugin PostCSS ou utilisez l'interface de ligne de commande Tailwind CLI.");

    </script>
</body>
